name: Compile Windows Executable

on:
  push:
    branches:
      - main  # Triggers the build every time you push to the main branch

jobs:
  build:
    runs-on: windows-latest  # Must run on Windows to generate a Windows .exe
    
    # CRITICAL: Gives the GITHUB_TOKEN permission to create Releases and upload files
    permissions:
      contents: write

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetches all history so release notes can see previous commits/tags

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Automatically caches dependencies to speed up future runs

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Standalone EXE with PyInstaller
      shell: bash
      run: |
        # Locate where pip installed tkinterdnd2 dynamically in the runner environment
        TKDND_PATH=$(python -c "import tkinterdnd2; import os; print(os.path.dirname(tkinterdnd2.__file__))")
        
        # Build the EXE including the tkinterdnd2 internal assets (configs removed as your app doesn't use them)
        pyinstaller --noconsole --onefile \
          --add-data "$TKDND_PATH;tkinterdnd2" \
          --name "Customer File Splitter" app.py

    - name: Generate Automatic Release Tag
      id: tag
      run: |
        echo "release_tag=v1.0.${{ github.run_number }}" >> $env:GITHUB_OUTPUT

    - name: Gather Commit Messages
      id: commits
      shell: bash # Using bash context makes multi-line string manipulation cleaner in GA
      run: |
        echo "LOGS<<EOF" >> $GITHUB_OUTPUT
        git log --format="* %s (%an)" -n 5 >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Upload EXE to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: Release ${{ steps.tag.outputs.release_tag }}
        body: |
          ### 📦 Automated Build
          Automated build generated by GitHub Actions.
          * **Commit SHA:** ${{ github.sha }}

          ### 📝 Recent Commits in this Push:
          ${{ steps.commits.outputs.LOGS }}
        generate_release_notes: true # GitHub will also auto-append its official changelog here
        files: "dist/Customer File Splitter.exe"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}